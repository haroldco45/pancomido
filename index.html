<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pan Comido - Tarjeta Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --marron-pan: #63402e;
            --crema-fondo: #f9f3e6;
            --whatsapp: #25D366;
            --instagram: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            --correo: #4b4b4b;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--crema-fondo);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 380px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
            border: 2px solid var(--marron-pan);
        }

        .header {
            padding: 30px 20px 10px;
        }

        /* Contenedor del logo con efecto circular */
        .logo-container {
            width: 180px;
            height: 180px;
            margin: 0 auto 15px;
            background: #fff; 
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            color: var(--marron-pan);
            margin: 10px 0;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        .location {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .links-container {
            padding: 0 25px 20px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 50px;
            font-weight: 700;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }

        .btn i { margin-right: 12px; font-size: 1.3rem; }

        .btn-ws { background-color: var(--whatsapp); }
        .btn-call { background-color: var(--marron-pan); }
        .btn-ig { background: var(--instagram); }
        .btn-mail { background-color: var(--correo); }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .products {
            background-color: #fff9ed;
            padding: 20px;
            border-top: 1px dashed var(--marron-pan);
            border-bottom: 1px dashed var(--marron-pan);
        }

        .products h3 { margin: 0 0 5px; font-size: 1rem; color: #333; }
        .products p { margin: 0; font-size: 0.85rem; color: #666; }
        .price { font-weight: bold; color: var(--marron-pan); display: block; margin-top: 5px; }

        .footer {
            padding: 20px;
            background: #f1f1f1;
            font-size: 0.7rem;
            color: #777;
            line-height: 1.4;
        }

        #subscription-shield { display: none; }

        @media (max-width: 350px) {
            .card { border-radius: 0; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <div class="header">
        <div class="logo-container">
            <img src="Screenshot_20260327_195037_Instagram.jpg" alt="Pan Comido Logo">
        </div>
        <h1>PAN COMIDO</h1>
        <div class="location">
            <i class="fa-solid fa-location-dot"></i> Caucasia, Antioquia
        </div>
    </div>

    <div class="links-container">
        <a href="https://wa.me/573002016984" class="btn btn-ws">
            <i class="fa-brands fa-whatsapp"></i> WhatsApp
        </a>
        <a href="tel:+573002016984" class="btn btn-call">
            <i class="fa-solid fa-phone"></i> Llamar
        </a>
        <a href="https://www.instagram.com/pancomidocol" class="btn btn-ig">
            <i class="fa-brands fa-instagram"></i> Instagram
        </a>
        <a href="mailto:pancomidocol@gmail.com" class="btn btn-mail">
            <i class="fa-solid fa-envelope"></i> Correo
        </a>
    </div>

    <div class="products">
        <h3>🍞 Especialidades de la Casa</h3>
        <p>Pan Flor (3 Quesos, Chocolate, Tentación)</p>
        <span class="price">COP 17,000</span>
    </div>

    <div class="footer">
        App desarrollada por <strong>Vibras Positivas (3117700431)</strong><br>
        © Derechos de Autor 2026<br>
        Vencimiento: 27/03/2027
        <div id="subscription-shield">2027-03-27</div>
    </div>
</div>

<script>
    (function() {
        const expirationDate = new Date(document.getElementById('subscription-shield').innerText);
        const today = new Date();
        
        if (today > expirationDate) {
            document.getElementById('main-card').innerHTML = `
                <div style="padding: 50px 20px; color: #721c24; background: #f8d7da;">
                    <i class="fa-solid fa-circle-exclamation" style="font-size: 3rem; margin-bottom: 20px;"></i>
                    <h2>SERVICIO SUSPENDIDO</h2>
                    <p>La suscripción de esta tarjeta digital ha vencido.</p>
                    <p>Por favor, contacte a <b>Vibras Positivas</b> para renovar.</p>
                    <br>
                    <a href="tel:3117700431" style="color: #721c24; font-weight: bold;">Llamar a Soporte</a>
                </div>
            `;
        }
    })();
</script>

</body>
</html>
