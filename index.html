<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pan Comido - Tarjeta Digital</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        :root {
            --color-principal: #63402e; /* Marrón del logo */
            --color-fondo: #f9f3e6;    /* Crema de fondo */
            --color-acento: #e63946;    /* Rojo del gorrito */
            --color-texto: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--color-fondo);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card-container {
            width: 90%;
            max-width: 400px;
            background: white;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
            border: 2px solid var(--color-principal);
        }

        .header {
            padding: 20px;
            background: #fff;
        }

        .logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--color-fondo);
        }

        h1 {
            color: var(--color-principal);
            margin: 10px 0 5px 0;
            text-transform: uppercase;
            font-size: 1.5rem;
        }

        .location {
            color: #777;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .btn-container {
            padding: 0 25px 25px 25px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.2s;
            color: white;
        }

        .btn:active { transform: scale(0.95); }

        .btn-whatsapp { background-color: #25D366; }
        .btn-call { background-color: var(--color-principal); }
        .btn-instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .btn-mail { background-color: #555; }

        .btn i { margin-right: 10px; }

        .catalog-section {
            background: var(--color-fondo);
            padding: 15px;
            font-size: 0.85rem;
        }

        .footer {
            padding: 15px;
            font-size: 0.7rem;
            color: #888;
            background: #eee;
        }

        /* Control de vencimiento invisible */
        #exp-control { display: none; }
    </style>
</head>
<body>

<div class="card-container">
    <div class="header">
        <img src="https://i.ibb.co/LdpXy7H/logo-pan-comido.jpg" alt="Logo Pan Comido" class="logo">
        <h1>Pan Comido</h1>
        <div class="location">
            <i class="material-icons" style="font-size:14px">place</i> Caucasia, Antioquia
        </div>
    </div>

    <div class="btn-container">
        <a href="https://wa.me/573002016984" class="btn btn-whatsapp">
            <i class="material-icons">chat</i> WhatsApp
        </a>
        <a href="tel:+573002016984" class="btn btn-call">
            <i class="material-icons">phone</i> Llamar
        </a>
        <a href="https://www.instagram.com/pancomidocol" target="_blank" class="btn btn-instagram">
            <i class="material-icons">camera_alt</i> Instagram
        </a>
        <a href="mailto:pancomidocol@gmail.com" class="btn btn-mail">
            <i class="material-icons">email</i> Correo
        </a>
    </div>

    <div class="catalog-section">
        <strong>🍞 Especialidades:</strong><br>
        Pan Flor (3 Quesos, Chocolate, Tentación)<br>
        <strong>COP 17,000</strong>
    </div>

    <div class="footer">
        App desarrollada por <strong>Vibras Positivas (3117700431)</strong><br>
        © Derechos de Autor 2026<br>
        <span id="exp-control">v:2027-03-27</span>
    </div>
</div>

<script>
    // Control invisible de suscripción
    const expiryDate = new Date('2027-03-27');
    const today = new Date();
    if (today > expiryDate) {
        document.body.innerHTML = "<div style='text-align:center; padding:50px;'><h3>Suscripción vencida</h3>Contacte a soporte técnico.</div>";
    }
</script>

</body>
</html>
